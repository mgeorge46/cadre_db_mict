<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Check Your Email | IT and Communication Cadre Tracking Database</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family:'Inter',sans-serif; min-height:100vh; background:linear-gradient(135deg,#1a2940 0%,#1B4F8A 50%,#00897B 100%); display:flex; align-items:center; justify-content:center; padding:20px; }
        .card { border:none; border-radius:20px; box-shadow:0 24px 64px rgba(0,0,0,.2); }
    </style>
</head>
<body>
<div class="card p-4 text-center" style="width:420px;">
    <div style="width:72px;height:72px;background:#d1fae5;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#059669;font-size:28px;margin:0 auto 20px;"><i class="fas fa-envelope-open-text"></i></div>
    <h5 class="fw-bold mb-2">Check your email</h5>
    <p class="text-muted small mb-4">If an account with that email exists, we've sent password reset instructions. Check your inbox (and spam folder).</p>
    <a href="{% url 'accounts:login' %}" class="btn btn-outline-primary"><i class="fas fa-sign-in-alt me-2"></i>Back to Sign In</a>
    <div class="mt-4" style="font-size:11px;color:#94a3b8;">Government of Uganda &copy; {% now "Y" %} | Ministry of ICT and National Guidance</div>
</div>
</body>
</html>
